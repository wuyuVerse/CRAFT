# Merge recovery trajectories and synthetic samples into a single SFT dataset.

input:
  real_data_dir: "output/iterative_learning"
  synthetic_data_dir: "output/synthetic_tasks"

output:
  dir: "output/merged_sft"

merge_ratio:
  real: 0.6
  synthetic: 0.4

domains:
  - airline
  - retail
  - telecom

shuffle: true
add_metadata: true
